<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Lockers</title>
  <link rel="stylesheet" href="admin-style.css" />
  <script src="theme.js"></script>
</head>
<body>
  <div class="sidebar">
    <h2>SmartLock</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-users.html">Usuarios</a>
    <button class="theme-toggle-admin" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
    <a href="login.html" class="logout">Cerrar sesión</a>
  </div>

  <div class="content">
    <h1>Lockers</h1>

    <div class="card">
      <h3>Crear locker</h3>
      <div style="display:flex;gap:8px;">
        <input id="newCode" placeholder="Código locker (ej: LCK-01)" style="flex:1;padding:8px;border-radius:6px;border:1px solid #ddd" />
        <button id="create">Crear</button>
      </div>
    </div>

    <div id="list" class="card">
      <h3>Lista de lockers</h3>
      <div id="tableLockers">Cargando...</div>
    </div>
  </div>

<script>
async function loadLockers(){
  const res = await fetch('/api/lockers');
  const data = await res.json();
  const items = data.lockers || [];
  const html = items.map(l=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee">
    <div><strong>${l.code}</strong> <small class="muted">#${l.id}</small><br/><small class="muted">Estado: ${l.status}</small></div>
    <div style="display:flex;gap:8px">
      <button onclick="assignPrompt(${l.id})">Asignar</button>
      <button onclick="deleteLocker(${l.id})" class="danger">Eliminar</button>
    </div>
  </div>`).join('') || '<small class="muted">No hay lockers</small>';
  document.getElementById('tableLockers').innerHTML = html;
}

document.getElementById('create').addEventListener('click', async ()=>{
  const code = document.getElementById('newCode').value.trim(); if(!code) return;
  await fetch('/api/lockers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
  document.getElementById('newCode').value=''; loadLockers();
});

window.assignPrompt = async function(lockerId){
  const uid = prompt('Introduce user id para asignar este locker:');
  if(!uid) return;
  const res = await fetch('/api/lockers/assign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lockerId: Number(lockerId), userId: Number(uid)})});
  const j = await res.json();
  if(j.ok) alert('Asignado ✅'); else alert('Error: '+(j.error||'---'));
  loadLockers();
}

window.deleteLocker = async function(id){
  if(!confirm('Eliminar locker?')) return;
  await fetch('/api/lockers/' + id, { method: 'DELETE' });
  loadLockers();
}

loadLockers();
</script>
</body>
</html>
