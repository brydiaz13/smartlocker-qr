<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartLock | Escáner</title>
  <link rel="stylesheet" href="style.css">
  <!-- Librería de lectura QR -->
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glass-container" style="max-width: 450px;">
    <h1><i class="fas fa-camera"></i> Escanear Locker</h1>
    <p>Apunta con la cámara al código QR del locker para desbloquearlo.</p>
    
    <div id="reader-wrapper" style="position: relative;">
      <div id="reader"></div>
      <!-- Overlay decorativo opcional -->
    </div>

    <div id="result" style="margin-top: 20px;">
      <span id="statusMessage" style="color: var(--text-muted);">Esperando escaneo...</span>
    </div>

    <div style="margin-top: 2rem;">
      <button class="btn-outline" onclick="window.location.href='dashboard.html'" style="width: 100%;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Volver al Dashboard
      </button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const statusMessage = document.getElementById("statusMessage");
      const resultDiv = document.getElementById("result");

      function onScanSuccess(decodedText) {
        statusMessage.textContent = "Procesando código...";
        statusMessage.style.color = "var(--primary)";

        try {
          const payload = JSON.parse(decodedText);

          fetch('/api/lockers/open-with-qr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          })
          .then(res => res.json())
          .then(data => {
            if (data.ok) {
              resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(16, 185, 129, 0.2); border-radius: 12px; color: var(--success); font-weight: 600;">
                ${data.message}
              </div>`;
              // Vibración si el dispositivo lo soporta
              if (navigator.vibrate) navigator.vibrate(200);
            } else {
              resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(239, 68, 68, 0.2); border-radius: 12px; color: var(--danger); font-weight: 600;">
                ${data.error || 'Error al abrir'}
              </div>`;
            }
          })
          .catch(err => {
            resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(239, 68, 68, 0.2); border-radius: 12px; color: var(--danger);">Error de conexión</div>`;
          });

        } catch (e) {
          resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(239, 68, 68, 0.2); border-radius: 12px; color: var(--danger);">QR inválido o no reconocido</div>`;
        }

        html5QrcodeScanner.clear(); 
      }

      function onScanFailure(error) {
        // Silencioso
      }

      const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader",
        { 
          fps: 15, 
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0
        }
      );
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    });
  </script>
</body>
</html>
