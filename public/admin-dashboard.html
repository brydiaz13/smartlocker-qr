<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartLock | Panel Admin</title>
  <link rel="stylesheet" href="admin-style.css">
  <script src="theme.js"></script>
</head>
<body>

  <div class="sidebar" role="navigation" aria-label="Menú principal">
    <h2>SmartLock</h2>
    <a href="admin-dashboard.html" class="active">Dashboard</a>
    <a href="admin-users.html">Usuarios</a>
    <a href="admin-lockers.html">Lockers</a>
    <a href="admin-logs.html">Historial</a>
    <button class="theme-toggle-admin" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
    <a href="login.html" class="logout">Cerrar sesión</a>
  </div>

  <div class="content" role="main">
    <h1>Panel de administración</h1>

    <div class="card">
      <h3>Resumen</h3>
      <p>Usuarios registrados, lockers y últimos accesos.</p>
      <div style="display:flex;gap:12px;margin-top:12px;">
        <div style="flex:1" class="card">
          <strong id="countUsers">—</strong><br/><small class="muted">Usuarios</small>
        </div>
        <div style="flex:1" class="card">
          <strong id="countLockers">—</strong><br/><small class="muted">Lockers</small>
        </div>
        <div style="flex:1" class="card">
          <strong id="countLogs">—</strong><br/><small class="muted">Accesos</small>
        </div>
      </div>
    </div>

    <div id="recent" class="card">
      <h3>Últimos accesos</h3>
      <div id="recentList">Cargando...</div>
    </div>

  </div>

<script>
(async function loadSummary(){
  const recentList = document.getElementById('recentList');
  try {
    const [uRes, lRes, logsRes] = await Promise.all([
      fetch('/api/users'),
      fetch('/api/lockers'),
      fetch('/api/logs')
    ]);

    if (!uRes.ok || !lRes.ok || !logsRes.ok) {
      throw new Error('Error al obtener datos del servidor');
    }

    const u = await uRes.json();
    const l = await lRes.json();
    const logs = await logsRes.json();

    // usuarios puede venir como arreglo [] o como { users: [] }
    const usersCount = Array.isArray(u) ? u.length : (u.users ? u.users.length : 0);
    const lockersCount = (l && l.lockers) ? l.lockers.length : 0;
    const logsArr = (logs && logs.logs) ? logs.logs : [];

    document.getElementById('countUsers').textContent = usersCount;
    document.getElementById('countLockers').textContent = lockersCount;
    document.getElementById('countLogs').textContent = logsArr.length;

    const recent = logsArr.slice(0,6).map(x => {
      const name = x.name || x.user_name || '—';
      const locker = x.locker_id || x.locker_code || '—';
      const time = new Date(x.timestamp || x.created_at || Date.now()).toLocaleString();
      return `<div style="padding:8px;border-bottom:1px solid #eee"><strong>${name}</strong> — Locker ${locker} — ${time}</div>`;
    }).join('');

    recentList.innerHTML = recent || '<small class="muted">Sin accesos recientes</small>';

  } catch (err) {
    console.error('Error cargando resumen:', err);
    recentList.innerHTML = `<small class="muted">No se pudieron cargar los datos. Revisa el servidor.</small>`;
    document.getElementById('countUsers').textContent = '—';
    document.getElementById('countLockers').textContent = '—';
    document.getElementById('countLogs').textContent = '—';
  }
})();
</script>

</body>
</html>
