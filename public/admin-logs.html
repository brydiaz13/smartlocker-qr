<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Historial</title>
  <link rel="stylesheet" href="admin-style.css" />
  <script src="theme.js"></script>
</head>
<body>
  <div class="sidebar">
    <h2>SmartLock</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-users.html">Usuarios</a>
    <a href="admin-lockers.html">Lockers</a>
    <a href="admin-logs.html" class="active">Historial</a>
    <button class="theme-toggle-admin" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
    <a href="login.html" class="logout">Cerrar sesión</a>
  </div>

  <div class="content">
    <h1>Historial de accesos</h1>
    <div class="card">
      <div id="logsTable">Cargando...</div>
    </div>
  </div>

<script>
async function loadLogs() {
  const res = await fetch('/api/logs');
  const data = await res.json();
  const rows = data.logs || [];
  document.getElementById('logsTable').innerHTML = `
    <table>
      <thead>
        <tr><th>ID</th><th>Usuario</th><th>Locker</th><th>Acción</th><th>Fecha</th></tr>
      </thead>
      <tbody>
        ${rows.map(l=>`<tr>
          <td>${l.id}</td>
          <td>${l.name || l.user_name || '-'}</td>
          <td>${l.locker_id || l.locker_code || '-'}</td>
          <td>${l.action}</td>
          <td>${new Date(l.timestamp || l.created_at).toLocaleString()}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

loadLogs();
</script>
</body>
</html>
