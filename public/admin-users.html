<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Usuarios</title>
  <link rel="stylesheet" href="admin-style.css" />
  <script src="theme.js"></script>
</head>
<body>

  <div class="sidebar">
    <h2>SmartLock</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-users.html" class="active">Usuarios</a>
    <a href="admin-lockers.html">Lockers</a>
    <a href="admin-logs.html">Historial</a>
    <button class="theme-toggle-admin" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
    <a href="login.html" class="logout">Cerrar sesión</a>
  </div>

  <div class="content">
    <h1>Gestión de Usuarios</h1>
    <div id="usersTable"></div>
  </div>

  <script>
    async function loadUsers() {
      const res = await fetch('/api/users');
      const data = await res.json();
      const usersTable = document.getElementById('usersTable');

      usersTable.innerHTML = `
        <table border="1" style="width:100%; border-collapse:collapse; margin-top:10px;">
          <tr style="background:#eee;">
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Acciones</th>
          </tr>
          ${data.users.map(u => `
            <tr>
              <td>${u.id}</td>
              <td>${u.name}</td>
              <td>${u.email}</td>
              <td>
                <button onclick="deleteUser(${u.id})">Eliminar</button>
              </td>
            </tr>
          `).join('')}
        </table>
      `;
    }

    async function deleteUser(id) {
      if (!confirm("¿Seguro de eliminar este usuario?")) return;

      await fetch('/api/users/' + id, { method: 'DELETE' });
      loadUsers();
    }

    loadUsers();
  </script>

</body>
</html>
